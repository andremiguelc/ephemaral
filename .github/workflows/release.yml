name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ephemaral-linux-x86_64
          - os: macos-latest
            artifact_name: ephemaral-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          build-args: "ephemaral"
          lake-package-directory: proofs

      - name: Rename binary
        run: cp proofs/.lake/build/bin/ephemaral ${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  create-release:
    needs: build-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

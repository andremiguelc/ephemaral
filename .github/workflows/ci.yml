name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Lean project
        uses: leanprover/lean-action@v1
        with:
          build: true
          test: false
          build-args: "ephemaral"
          lake-package-directory: proofs

      - name: Install Z3
        run: sudo apt-get install -y z3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: pip install pytest jsonschema

      - name: Run tests
        run: pytest proofs/tests/ -v
